spring.application.name=SamadhanAI

# MySQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/samadhanAi}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Spring AI ? Groq (Free)
# Get API key: console.groq.com
# REGENERATE YOUR KEY ? old one was exposed in chat
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

#----> JWT
app.jwt.secret=${APP_JWT_SECRET:}
# 86400 seconds -> 24 hrs
app.jwt.expiration-ms=86400000


# File Upload ? Max 10MB for complaint photos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=35MB
spring.servlet.multipart.enabled=true


# Email ? Gmail SMTP (Free)

# HOW TO SETUP (one time):
# 1. Go to myaccount.google.com
# 2. Security ? 2-Step Verification ? Turn ON
# 3. Security ? App Passwords
# 4. Generate password for "Mail" ? paste below

spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.protocol=smtps
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=60000
spring.mail.properties.mail.smtp.writetimeout=60000

# Photo Upload Directory
app.upload.dir=${APP_UPLOAD_DIR:/tmp/uploads/}

# Dashboard Config
app.dashboard.ignored-days-threshold=30


# Reminder Scheduler ? Feature 8
app.reminder.days-threshold=15

# Railway sets PORT; bind on all interfaces so the proxy can reach the app
server.port=${PORT:8081}
server.address=0.0.0.0


# Email Reply Listener ? Way 3: Auto-resolve
# IMAP Gmail Incoming Mail
# Same account jo email bhejta hai ? same inbox check karega

app.email.imap.host=imap.gmail.com
app.email.imap.port=993
app.email.imap.username=${APP_EMAIL_IMAP_USERNAME:}
app.email.imap.password=${APP_EMAIL_IMAP_PASSWORD:}

# Check inbox every 30 min (30 * 60 * 1000 = 1800000 ms)
app.email.reply.check-interval-ms=1800000

# Set false in dev if you don't want real IMAP calls
app.email.reply.enabled=true


