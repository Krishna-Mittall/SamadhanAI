spring.application.name=SamadhanAI

# ?????????????????????????????????????????
# MySQL Database
# ?????????????????????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/samadhanAi}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ?????????????????????????????????????????
# Spring AI ? Groq
# REGENERATE YOUR KEY ? old one was exposed in chat
# ?????????????????????????????????????????
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# ?????????????????????????????????????????
# JWT
# ?????????????????????????????????????????
app.jwt.secret=${APP_JWT_SECRET:}
# 86400000 ms ? 24 hrs
app.jwt.expiration-ms=86400000

# ?????????????????????????????????????????
# File Upload ? Max 10MB for complaint photos
# ?????????????????????????????????????????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=35MB
spring.servlet.multipart.enabled=true

# ?????????????????????????????????????????
# Email ? SendGrid HTTP API (Railway compatible)
# Free: 100 emails/day
# ?????????????????????????????????????????
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=samadhanai.complaints@gmail.com
sendgrid.from.name=SamadhanAI Civic Platform

# ?????????????????????????????????????????
# Photo Upload Directory
# ?????????????????????????????????????????
app.upload.dir=${APP_UPLOAD_DIR:/tmp/uploads/}

# ?????????????????????????????????????????
# Dashboard Config
# ?????????????????????????????????????????
app.dashboard.ignored-days-threshold=30

# ?????????????????????????????????????????
# Reminder Scheduler ? Feature 8
# ?????????????????????????????????????????
app.reminder.days-threshold=15

# ?????????????????????????????????????????
# Server ? Railway compatible
# Railway sets PORT env var automatically
# ?????????????????????????????????????????
server.port=${PORT:8081}
server.address=0.0.0.0

# ?????????????????????????????????????????
# Email Reply Listener ? IMAP Gmail
# Same account jo email bhejta hai
# ?????????????????????????????????????????
app.email.imap.host=imap.gmail.com
app.email.imap.port=993
app.email.imap.username=${APP_EMAIL_IMAP_USERNAME:}
app.email.imap.password=${APP_EMAIL_IMAP_PASSWORD:}

# Check inbox every 30 min
app.email.reply.check-interval-ms=1800000
app.email.reply.enabled=true