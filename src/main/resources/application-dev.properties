# ???????????????????????????????????????????????????????????
# application-dev.properties
# Development environment overrides
# Activated by: --spring.profiles.active=dev
# OR in IntelliJ: Edit Configurations ? Active profiles ? dev
# ???????????????????????????????????????????????????????????

# ?????????????????????????????????????????????????????????
# MySQL ? Dev Database (separate from prod)
# ?????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/samadhanAi
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# ?????????????????????????????????????????????????????????
# Spring AI ? Groq
# ?? REGENERATE YOUR KEY ? old one was exposed in chat
# ?????????????????????????????????????????????????????????
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Faster responses during dev ? reduce token limit
spring.ai.openai.chat.options.max-tokens=500

# ???????????????????????????????????????????????????????????
# JWT ? Feature 5
# ? ADDED: Same secret as main ? needed in dev too
# ???????????????????????????????????????????????????????????
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=86400000

# ?????????????????????????????????????????????????????????
# Email ? Dev Mode (Mailtrap)
# Catches all emails ? real departments ko nahi jaata
# Setup: mailtrap.io ? free account ? SMTP credentials
# ?????????????????????????????????????????????????????????
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ?????????????????????????????????????????????????????????
# Photo Upload ? Dev folder
# ?????????????????????????????????????????????????????????
app.upload.dir=src/main/resources/static/uploads/dev/

# ?????????????????????????????????????????????????????????
# Dashboard ? Dev Settings
# ?????????????????????????????????????????????????????????
app.dashboard.ignored-days-threshold=30

# ???????????????????????????????????????????????????????????
# Reminder Scheduler ? Feature 8
# ? ADDED: Was missing
# ???????????????????????????????????????????????????????????
app.reminder.days-threshold=15

# ?????????????????????????????????????????????????????????
# Logging ? Dev
# ? FIX: Correct package name ? com.samadhanai.samadhanai
# Old wrong value was: com.samadhanAi (wrong case + missing package)
# ?????????????????????????????????????????????????????????
logging.level.com.samadhanai.samadhanai=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ?????????????????????????????????????????????????????????
# Swagger UI ? Dev only
# Access: http://localhost:8080/swagger-ui/index.html
# ?????????????????????????????????????????????????????????
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# ?????????????????????????????????????????????????????????
# Server ? Dev
# ?????????????????????????????????????????????????????????
server.port=8081

# Show full error details in dev
# WARNING: Never set true in production
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param





# ???????????????????????????????????????????????????
# Email Reply ? Dev Mode
# Dev mein IMAP check band rakho ? real inbox disturb na ho
# ???????????????????????????????????????????????????
app.email.imap.host=imap.gmail.com
app.email.imap.port=993
app.email.imap.username=${APP_EMAIL_IMAP_USERNAME:}
app.email.imap.password=${APP_EMAIL_IMAP_PASSWORD:}

# Dev mein disabled ? test karna ho to true kar do
app.email.reply.enabled=true

# Dev mein 30 sec min interval (agar enabled ho to jaldi test ho)
app.email.reply.check-interval-ms=30000

